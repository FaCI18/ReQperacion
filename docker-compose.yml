version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: reqperacion-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: reqperacion_root_pass
      MYSQL_DATABASE: reqperacion
      MYSQL_USER: reqperacion_user
      MYSQL_PASSWORD: reqperacion_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: reqperacion-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8000:8000"
    volumes:
      - .:/app
      - upload_data:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://reqperacion_user:reqperacion_pass@mysql:3306/reqperacion
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: reqperacion_user
      MYSQL_PASSWORD: reqperacion_pass
      MYSQL_DATABASE: reqperacion
      UPLOAD_FOLDER: /data/uploads

  worker:
    build: .
    container_name: reqperacion-worker
    restart: unless-stopped
    volumes:
      - .:/app
      - upload_data:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://reqperacion_user:reqperacion_pass@mysql:3306/reqperacion
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: reqperacion_user
      MYSQL_PASSWORD: reqperacion_pass
      MYSQL_DATABASE: reqperacion
      UPLOAD_FOLDER: /data/uploads
      PYTHONPATH: /app
    command: python /app/app/worker.py

volumes:
  mysql_data:
  upload_data:
